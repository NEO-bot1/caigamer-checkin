name: Caigamer Daily Check-in

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  checkin-account-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei fonts-noto-cjk fonts-noto-color-emoji
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: Run check-in for account 1
        env:
          CAIGAMER_USERNAME: ${{ secrets.CAIGAMER_USERNAME }}
          CAIGAMER_PASSWORD: ${{ secrets.CAIGAMER_PASSWORD }}
        run: python checkin.py
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-account-1
          path: page_*.png
          retention-days: 7

  checkin-account-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei fonts-noto-cjk fonts-noto-color-emoji
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: Run check-in for account 2
        env:
          CAIGAMER_USERNAME: ${{ secrets.CAIGAMER_USERNAME_2 }}
          CAIGAMER_PASSWORD: ${{ secrets.CAIGAMER_PASSWORD_2 }}
        run: python checkin.py
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-account-2
          path: page_*.png
          retention-days: 7
