# Workflow name / 工作流名称
name: Caigamer Daily Check-in

# Trigger conditions / 触发条件
on:
  # Run daily at 01:00 UTC / 每天 UTC 01:00 自动运行
  schedule:
    - cron: '0 1 * * *'
  # Allow manual execution from the Actions tab / 允许手动从 Actions 页面触发
  workflow_dispatch:

# Minimal permissions required for checkout and artifact upload / 最小权限设置
permissions:
  contents: read

# Prevent duplicate runs from overlapping / 避免重复任务重叠执行
concurrency:
  group: caigamer-checkin
  cancel-in-progress: true

jobs:
  # Single matrix job to support multiple accounts / 使用矩阵任务统一处理多个账号
  checkin:
    name: Check-in (${{ matrix.account }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      # Continue all account jobs even if one fails / 一个账号失败不影响其他账号
      fail-fast: false
      matrix:
        include:
          - account: account-1
            username_secret: CAIGAMER_USERNAME
            password_secret: CAIGAMER_PASSWORD
          - account: account-2
            username_secret: CAIGAMER_USERNAME_2
            password_secret: CAIGAMER_PASSWORD_2

    steps:
      # Check out the repository / 拉取仓库代码
      - uses: actions/checkout@v4

      # Set up Python runtime / 配置 Python 运行环境
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install fonts required by Chromium for Chinese rendering / 安装中文字体，避免页面乱码
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei fonts-noto-cjk fonts-noto-color-emoji

      # Install Python dependencies and Playwright browser / 安装 Python 依赖与 Playwright 浏览器
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Debug resolved secret keys
        run: echo "matrix.username_secret=${{ matrix.username_secret }} matrix.password_secret=${{ matrix.password_secret }}"

      # Run the check-in script with the current account's secrets / 使用当前账号的 Secret 运行签到脚本
      - name: Run check-in for ${{ matrix.account }}
        env:
          CAIGAMER_USERNAME: ${{ secrets[matrix.username_secret] || secrets.CAIGAMER_USERNAME }}
          CAIGAMER_PASSWORD: ${{ secrets[matrix.password_secret] || secrets.CAIGAMER_PASSWORD }}
        run: python checkin.py

      # Always upload screenshots for debugging / 无论成功失败都上传截图用于排查
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.account }}
          path: page_*.png
          if-no-files-found: ignore
          retention-days: 7
