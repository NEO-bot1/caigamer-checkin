name: Caigamer Daily Check-in

on:
  schedule:
    # UTC 01:00 = Beijing Time 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei fonts-noto-cjk fonts-noto-color-emoji

      - name: Install Python dependencies & Playwright Chromium
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run check-in script
        env:
          # Single account convenience (kept for backward compatibility)
          CAIGAMER_USERNAME: ${{ secrets.CAIGAMER_USERNAME }}
          CAIGAMER_PASSWORD: ${{ secrets.CAIGAMER_PASSWORD }}
          # Optional numbered accounts: CAIGAMER_USERNAME_2, CAIGAMER_PASSWORD_2 ... (set as secrets)
          # Or provide JSON array via CAIGAMER_ACCOUNTS secret, e.g:
          # [{"username":"u1","password":"p1"},{"username":"u2","password":"p2"}]
          CAIGAMER_ACCOUNTS: ${{ secrets.CAIGAMER_ACCOUNTS }}
          # Numbered account secrets (support up to 3 accounts total)
          CAIGAMER_USERNAME_2: ${{ secrets.CAIGAMER_USERNAME_2 }}
          CAIGAMER_PASSWORD_2: ${{ secrets.CAIGAMER_PASSWORD_2 }}
          CAIGAMER_USERNAME_3: ${{ secrets.CAIGAMER_USERNAME_3 }}
          CAIGAMER_PASSWORD_3: ${{ secrets.CAIGAMER_PASSWORD_3 }}
          # Email/SMS notification settings (optional). Configure these secrets to enable error emails.
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python checkin.py

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: page_*.png
          retention-days: 7
